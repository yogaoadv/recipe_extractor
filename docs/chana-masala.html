<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>Chana Masala</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;
  --c-intro:#1a1a2e;   --a-intro:#ff9800;
  --c-section:#111;    --a-section:#555;
  --c-ing:#0d1f0d;     --a-ing:#4caf50;
  --c-step:#0d1220;    --a-step:#42a5f5;
  --c-done:#1a0d2e;    --a-done:#ce93d8;
  --text:#f0f0f0;      --muted:#777;
  --prog-bg:#1e1e1e;
  --radius:22px;
}
html,body{height:100%;background:var(--bg);overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}

#app{
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  padding:max(env(safe-area-inset-top),14px) 16px max(env(safe-area-inset-bottom),16px);
  gap:10px;
}

/* progress */
#prog-row{display:flex;align-items:center;gap:10px;flex-shrink:0}
#prog-bar{flex:1;height:4px;background:var(--prog-bg);border-radius:2px;overflow:hidden}
#prog-fill{height:100%;border-radius:2px;transition:width .35s ease,background .35s ease;width:0%}
#prog-lbl{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}

/* card stage */
#stage{flex:1;position:relative;min-height:0;overflow:hidden}

.card{
  position:absolute;inset:0;
  border-radius:var(--radius);
  padding:32px 26px;
  display:flex;flex-direction:column;justify-content:center;gap:18px;
  overflow:hidden;
  will-change:transform;
  transition:transform .12s ease;
  touch-action:none;
}
.card.intro            {background:var(--c-intro)}
.card.section          {background:var(--c-section);justify-content:flex-end;padding-bottom:36px}
.card.ingredients_all  {background:var(--c-ing);justify-content:flex-start;overflow-y:auto;padding-top:28px;touch-action:pan-y}
.card.step             {background:var(--c-step)}
.card.done             {background:var(--c-done);align-items:center;text-align:center}

/* typography */
.badge{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;opacity:.65}
.group{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase}
.main{color:var(--text);font-size:clamp(22px,6vw,32px);font-weight:600;line-height:1.35}
.sub {color:var(--muted);font-size:14px;line-height:1.6}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{background:rgba(255,255,255,.07);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--text)}
.step-num{font-size:72px;font-weight:800;line-height:1;opacity:.18}
.done-icon{font-size:72px}
.section-label{color:var(--text);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.4}
.section-count{color:var(--text);font-size:clamp(42px,11vw,64px);font-weight:800;line-height:1;opacity:.15}

/* swipe overlays */
.hint{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:52px;font-weight:900;opacity:0;pointer-events:none;
  border-radius:14px;padding:6px 14px;transition:opacity .08s;
}
.hint.l{left:18px;color:#ef5350}
.hint.r{right:18px;color:#66bb6a}

/* nav buttons */
#nav{display:flex;gap:10px;flex-shrink:0}
.btn{flex:1;height:54px;border:none;border-radius:16px;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.96)}
.btn.back{background:#1a1a1a;color:var(--muted)}
.btn.next{background:#4caf50;color:#fff}
.btn:disabled{opacity:.3;pointer-events:none}
</style>
</head>
<body>
<div id="app">
  <div id="prog-row">
    <div id="prog-bar"><div id="prog-fill"></div></div>
    <div id="prog-lbl">1 / 18</div>
  </div>
  <div id="stage">
    <div class="card" id="card">
      <div id="cc"></div>
      <div class="hint l" id="hl">&#8617;</div>
      <div class="hint r" id="hr">&#10003;</div>
    </div>
  </div>
  <div id="nav">
    <button class="btn back" id="bb">&#8592; Back</button>
    <button class="btn next" id="bn">Next &#8594;</button>
  </div>
</div>
<script>
const C=[{"type": "intro", "recipe_name": "Chana Masala", "cuisine": "Indian", "time": "55-65 minutes", "difficulty": "Medium", "source_url": "https://www.youtube.com/watch?v=RXZsDHKlVGw"}, {"type": "ingredients_all", "items": [{"group": "BASE", "text": "250 GRAMS CHICKPEAS"}, {"group": "BASE", "text": "1 NO. BAY LEAF"}, {"group": "BASE", "text": "2-3 INCH CINNAMON"}, {"group": "BASE", "text": "1 NO. BLACK CARDAMOM"}, {"group": "BASE", "text": "3-4 CLOVES"}, {"group": "BASE", "text": "AS REQUIRED (1 INCH ABOVE) WATER"}, {"group": "BASE", "text": "TO TASTE SALT"}, {"group": "BASE", "text": "A PINCH BAKING SODA"}, {"group": "ONION PASTE", "text": "3 MEDIUM (ROUGHLY CHOPPED) ONION"}, {"group": "TOMATO PASTE", "text": "3 NOS. (ROUGHLY CHOPPED) TOMATO"}, {"group": "TOMATO PASTE", "text": "2 INCH GINGER"}, {"group": "TOMATO PASTE", "text": "2 NOS. GREEN CHILLI"}, {"group": "TOMATO PASTE", "text": "10-15 CLOVES GARLIC"}, {"group": "COOKING", "text": "2 TBSP GHEE"}, {"group": "COOKING", "text": "1 TBSP OIL"}, {"group": "COOKING", "text": "1 TSP CUMIN SEEDS"}, {"group": "COOKING", "text": "A PINCH CAROM SEEDS"}, {"group": "COOKING", "text": "¼ TSP ASAFOETIDA"}, {"group": "POWDERED SPICES", "text": "½ TSP TURMERIC POWDER"}, {"group": "POWDERED SPICES", "text": "1 TBSP KASHMIRI RED CHILLI POWDER"}, {"group": "POWDERED SPICES", "text": "2 TBSP CORIANDER POWDER"}, {"group": "POWDERED SPICES", "text": "1 TSP CUMIN POWDER"}, {"group": "POWDERED SPICES", "text": "1 TSP YELLOW CHILLI POWDER"}, {"group": "POWDERED SPICES", "text": "1 TSP DRY MANGO POWDER"}, {"group": "POWDERED SPICES", "text": "A LARGE PINCH BLACK SALT"}, {"group": "POWDERED SPICES", "text": "TO TASTE SALT"}, {"group": "FINISH", "text": "AS REQUIRED HOT WATER"}, {"group": "FINISH", "text": "1 TBSP KASURI METHI"}, {"group": "FINISH", "text": "A HANDFUL GINGER JULIENNE"}, {"group": "FINISH", "text": "2 NOS. (SLICED) GREEN CHILLI"}, {"group": "FINISH", "text": "A PINCH GARAM MASALA"}, {"group": "FINISH", "text": "A HANDFUL (CHOPPED) FRESH CORIANDER"}]}, {"type": "section", "label": "METHOD", "count": 14}, {"type": "step", "step": 1, "text": "Soak the chickpeas in water for 6-8 hours or overnight, then discard the water & wash them thoroughly to get rid of any smell."}, {"type": "step", "step": 2, "text": "Add the soaked chickpeas into a pressure cooker along with the whole spices, salt, water & baking soda & pressure cook over high flame for one whistle then over medium flame for 4-5 more whistles."}, {"type": "step", "step": 3, "text": "Switch off the flame & let the cooker depressurize naturally, then open the lid & check if the chickpeas are cooked, if not then pressure cooker them for 1 or 2 more whistles."}, {"type": "step", "step": 4, "text": "Discard the whole spices & keep the cooked chickpeas aside."}, {"type": "step", "step": 5, "text": "Add the onions into a mixer jar & grind them into a paste."}, {"type": "step", "step": 6, "text": "Similarly, add all the ingredients of the tomato puree & blend them into a fine puree."}, {"type": "step", "step": 7, "text": "Set a kadhai over high heat, add ghee & oil, let it get hot."}, {"type": "step", "step": 8, "text": "Further add cumin & carom seeds along with asafoetida & onion paste, stir well & cook over high flame until it turns golden brown, you can add splashes of hot water if the paste starts sticking to kadhai."}, {"type": "step", "step": 9, "text": "Lower the flame & add all the powdered spices with a splash of water, stir well & cook the spices over high flame for a minute or two."}, {"type": "step", "step": 10, "text": "Next,  add the tomato puree with salt & cook until the ghee separates & the masala becomes crumbly, this will take 10-12 minutes, if it becomes dry then add hot water & cook it further."}, {"type": "step", "step": 11, "text": "Then add the cooked chole, stir well & simmer it for 6-8 minutes or until it becomes semi-thick."}, {"type": "step", "step": 12, "text": "You can also mash a few chickpeas to thicken up the gravy faster."}, {"type": "step", "step": 13, "text": "Once the gravy becomes semi-thick, dry roast kasuri methi over medium flame in a separate pan then transfer it into a small bowl, crush it between your hands & add it to the gravy along with ginger, green chilli, garam masala & fresh coriander, stir well."}, {"type": "step", "step": 14, "text": "Your delicious, dhaba style chana masala is ready, serve it with some hot tandoori roti or bread kulcha with jeera rice."}, {"type": "done", "recipe_name": "Chana Masala"}];
let i=0;
const card=document.getElementById('card');
const cc=document.getElementById('cc');
const fill=document.getElementById('prog-fill');
const lbl=document.getElementById('prog-lbl');
const hl=document.getElementById('hl');
const hr=document.getElementById('hr');
const bb=document.getElementById('bb');
const bn=document.getElementById('bn');

const ACCENT={intro:'var(--a-intro)',section:'var(--a-section)',
  ingredients_all:'var(--a-ing)',ingredient:'var(--a-ing)',
  step:'var(--a-step)',done:'var(--a-done)'};

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  const c=C[i];
  const ac=ACCENT[c.type]||'#fff';
  fill.style.width=((i+1)/C.length*100)+'%';
  fill.style.background=ac;
  lbl.textContent=(i+1)+' / '+C.length;
  card.className='card '+c.type;
  card.style.transform='';
  hl.style.opacity=0; hr.style.opacity=0;
  bb.disabled=(i===0);
  bn.textContent=i===C.length-1?'Done ✔':'Next →';

  let h='';
  if(c.type==='intro'){
    h=`<div class="badge" style="color:${ac}">Recipe</div>
       <div class="main">${esc(c.recipe_name)}</div>
       <div class="pills">
         ${c.cuisine?`<span class="pill">${esc(c.cuisine)}</span>`:''}
         ${c.time?`<span class="pill">⏱ ${esc(c.time)}</span>`:''}
         ${c.difficulty?`<span class="pill">${esc(c.difficulty)}</span>`:''}
       </div>
       <div class="sub">Swipe right or tap Next to start</div>
       ${c.source_url?`<a href="${esc(c.source_url)}" target="_blank" rel="noopener" style="color:var(--a-intro);font-size:13px;opacity:.7;text-decoration:none">▶ Watch video</a>`:''}
`;
  } else if(c.type==='ingredients_all'){
    const groups={};
    c.items.forEach(it=>{
      (groups[it.group]=groups[it.group]||[]).push(it.text);
    });
    const rows=Object.entries(groups).map(([g,items])=>`
      <div style="font-size:10px;font-weight:700;letter-spacing:1.8px;color:var(--a-ing);opacity:.8;margin-top:14px;margin-bottom:6px">${esc(g)}</div>
      ${items.map(t=>`<div style="font-size:17px;font-weight:500;color:var(--text);padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)">${esc(t)}</div>`).join('')}
    `).join('');
    h=`<div style="font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;opacity:.65;color:var(--a-ing)">Ingredients</div>${rows}`;
  } else if(c.type==='section'){
    h=`<div class="section-count">${esc(c.count)}</div>
       <div class="section-label">${esc(c.label)}</div>`;
  } else if(c.type==='ingredient'){
    h=`<div class="group" style="color:${ac}">${esc(c.group)}</div>
       <div class="main">${esc(c.text)}</div>`;
  } else if(c.type==='step'){
    h=`<div class="step-num" style="color:${ac}">${esc(c.step)}</div>
       <div class="main">${esc(c.text)}</div>`;
  } else if(c.type==='done'){
    h=`<div class="done-icon">🎉</div>
       <div class="main">${esc(c.recipe_name)}</div>
       <div class="sub">Enjoy your meal!</div>`;
  }
  cc.innerHTML=h;
}

function go(dir){
  const n=i+dir;
  if(n<0||n>=C.length) return;
  i=n; render();
}

bn.addEventListener('click',()=>go(1));
bb.addEventListener('click',()=>go(-1));

// swipe
let sx,sy,dragging=false;
card.addEventListener('touchstart',e=>{
  sx=e.touches[0].clientX; sy=e.touches[0].clientY; dragging=true;
},{passive:true});
card.addEventListener('touchmove',e=>{
  if(!dragging) return;
  const dx=e.touches[0].clientX-sx;
  const dy=e.touches[0].clientY-sy;
  if(Math.abs(dy)>Math.abs(dx)*1.4){dragging=false;return;}
  e.preventDefault();
  const rot=dx/18;
  card.style.transition='none';
  card.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
  const r=Math.min(Math.abs(dx)/100,1);
  hr.style.opacity=dx>0?r:0;
  hl.style.opacity=dx<0?r:0;
},{passive:false});
card.addEventListener('touchend',e=>{
  if(!dragging) return;
  dragging=false;
  card.style.transition='';
  const dx=e.changedTouches[0].clientX-sx;
  if(dx>80) go(1);
  else if(dx<-80) go(-1);
  else{card.style.transform='';hl.style.opacity=0;hr.style.opacity=0;}
});

render();
</script>
</body>
</html>
