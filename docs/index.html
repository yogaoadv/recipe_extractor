<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>My Recipes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;
  --surface:#161616;
  --surface2:#1e1e1e;
  --text:#f0f0f0;
  --muted:#666;
  --muted2:#444;
  --accent:#4caf50;
  --radius:16px;
  --diff-easy:#4caf50;
  --diff-medium:#ff9800;
  --diff-hard:#f44336;
}
html,body{
  min-height:100%;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color:var(--text);
}

#app{
  display:flex;flex-direction:column;
  padding:max(env(safe-area-inset-top),20px) 16px max(env(safe-area-inset-bottom),24px);
  gap:16px;min-height:100vh;min-height:100dvh;
}

/* header */
#header{display:flex;align-items:baseline;justify-content:space-between}
#title{font-size:26px;font-weight:800;letter-spacing:-.5px}
#recipe-count{color:var(--muted);font-size:13px}

/* search */
#search-wrap{position:relative}
#search{
  width:100%;height:46px;
  background:var(--surface2);border:1px solid var(--muted2);border-radius:12px;
  padding:0 16px 0 42px;
  font-size:15px;color:var(--text);outline:none;
  -webkit-appearance:none;appearance:none;
}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:var(--accent)}
#search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:16px;pointer-events:none;
}

/* filter chips */
#filters{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;
  scrollbar-width:none;
}
#filters::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--muted2);
  background:transparent;color:var(--muted);
  font-size:13px;font-weight:600;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
  white-space:nowrap;
}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* recipe list */
#list{display:flex;flex-direction:column;gap:10px;flex:1}

.recipe-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border-radius:var(--radius);
  padding:16px;cursor:pointer;
  border:1px solid transparent;
  transition:border-color .15s,background .15s;
  text-decoration:none;color:inherit;
}
.recipe-card:active{background:var(--surface2)}

.card-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.card-name{font-size:16px;font-weight:600;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}

.pill{
  padding:3px 10px;border-radius:12px;
  font-size:11px;font-weight:600;
  background:rgba(255,255,255,.06);color:var(--muted);
}
.pill.cuisine{color:#90caf9;background:rgba(144,202,249,.1)}
.pill.diff-Easy  {color:var(--diff-easy);background:rgba(76,175,80,.1)}
.pill.diff-Medium{color:var(--diff-medium);background:rgba(255,152,0,.1)}
.pill.diff-Hard  {color:var(--diff-hard);background:rgba(244,67,54,.1)}

.status-dot{font-size:16px;flex-shrink:0}

.card-arrow{color:var(--muted2);font-size:18px;flex-shrink:0}

/* empty state */
#empty{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;flex:1;color:var(--muted);text-align:center;padding:40px 0;
}
#empty.show{display:flex}
#empty-icon{font-size:48px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">My Recipes</div>
    <div id="recipe-count"></div>
  </div>

  <div id="search-wrap">
    <span id="search-icon">&#128269;</span>
    <input id="search" type="search" placeholder="Search recipes…" autocomplete="off" spellcheck="false">
  </div>

  <div id="filters"></div>

  <div id="list"></div>
  <div id="empty">
    <div class="empty-icon">🍽️</div>
    <div>No recipes found</div>
  </div>
</div>

<script>
const R = [{"name": "Aglio e Olio", "cuisine": "Italian", "time": "25 mins", "difficulty": "Easy", "status": "Regular", "tags": ["quick", "dinner", "lunch"], "slug": "aglio-e-olio"}, {"name": "Rava Upma", "cuisine": "Indian", "time": "20 mins", "difficulty": "Easy", "status": "Regular", "tags": ["breakfast", "quick", "vegetarian", "one-pot"], "slug": "rava-upma"}];

const STATUS_ICON = {
  'Favourite':   '★',
  'Regular':     '●',
  'Tried Once':  '◎',
  'Want to Try': '○',
};

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// build cuisine filter list
const cuisines = ['All', ...new Set(R.map(r=>r.cuisine).filter(Boolean).sort())];
let activeFilter = 'All';
let searchQuery  = '';

const filtersEl     = document.getElementById('filters');
const listEl        = document.getElementById('list');
const emptyEl       = document.getElementById('empty');
const countEl       = document.getElementById('recipe-count');
const searchEl      = document.getElementById('search');

// render chips
cuisines.forEach(c=>{
  const btn = document.createElement('button');
  btn.className = 'chip' + (c==='All'?' active':'');
  btn.textContent = c;
  btn.addEventListener('click',()=>{
    activeFilter = c;
    document.querySelectorAll('.chip').forEach(el=>el.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  filtersEl.appendChild(btn);
});

function filtered(){
  const q = searchQuery.toLowerCase();
  return R.filter(r=>{
    const matchFilter = activeFilter==='All' || r.cuisine===activeFilter;
    const matchSearch = !q ||
      r.name.toLowerCase().includes(q) ||
      (r.cuisine||'').toLowerCase().includes(q) ||
      (r.tags||[]).some(t=>t.toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });
}

function render(){
  const results = filtered();
  listEl.innerHTML = '';
  emptyEl.classList.toggle('show', results.length===0);
  countEl.textContent = results.length + ' recipe' + (results.length!==1?'s':'');

  results.forEach(r=>{
    const a = document.createElement('a');
    a.className = 'recipe-card';
    a.href = r.slug + '.html';

    const diffClass = r.difficulty ? 'diff-'+r.difficulty : '';
    const icon = STATUS_ICON[r.status] || '';

    a.innerHTML = `
      <div class="card-left">
        <div class="card-name">${esc(r.name)}</div>
        <div class="card-meta">
          ${r.cuisine?`<span class="pill cuisine">${esc(r.cuisine)}</span>`:''}
          ${r.time?`<span class="pill">⏱ ${esc(r.time)}</span>`:''}
          ${r.difficulty?`<span class="pill ${diffClass}">${esc(r.difficulty)}</span>`:''}
        </div>
      </div>
      ${icon?`<div class="status-dot" title="${esc(r.status)}">${icon}</div>`:''}
      <div class="card-arrow">›</div>
    `;
    listEl.appendChild(a);
  });
}

searchEl.addEventListener('input', e=>{
  searchQuery = e.target.value;
  render();
});

render();
</script>
</body>
</html>
